<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>From Overwhelm to Outcomes · ND Game</title>
<script>
  const FIREBASE_URL = "https://csam-command-center-default-rtdb.firebaseio.com";
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#0F1E45}
body{color:#fff;font-family:'DM Sans',sans-serif}
.syne{font-family:'Syne',sans-serif;font-weight:800}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.fade{animation:fadeUp .4s ease forwards}
.opt{width:100%;padding:14px 18px;background:rgba(26,47,107,.5);border:2px solid rgba(0,180,216,.2);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-align:left;transition:all .2s;display:block;margin-bottom:8px}
.opt:hover{border-color:#00B4D8;background:rgba(0,180,216,.1);transform:translateX(3px)}
.opt.sel{border-color:#00B4D8;background:rgba(0,180,216,.2)}
.opt.correct{border-color:#06D6A0;background:rgba(6,214,160,.2);cursor:default}
.opt.wrong{border-color:#EF476F;background:rgba(239,71,111,.12);opacity:.6;cursor:default}
.opt.done{cursor:default}
.bar{height:5px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:4px}
.fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#00B4D8,#48CAE4);transition:width .6s}
.lbrow{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(26,47,107,.4);border-radius:10px;border:1px solid rgba(0,180,216,.1);margin-bottom:6px}
.lbrow.gold{border-color:#F4A261;background:rgba(244,162,97,.08)}
input[type=text]{width:100%;padding:12px 16px;border-radius:10px;background:rgba(26,47,107,.6);border:2px solid rgba(0,180,216,.3);color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px}
input[type=text]::placeholder{color:rgba(255,255,255,.3)}
input[type=text]:focus{border-color:#00B4D8}
button.btn{font-family:'Syne',sans-serif;font-weight:700;border:none;cursor:pointer;border-radius:10px;padding:10px 18px;font-size:13px;transition:transform .15s,opacity .15s}
button.btn:disabled{opacity:.5;cursor:not-allowed}
button.btn:not(:disabled):hover{transform:translateY(-1px)}
button.btn:not(:disabled):active{transform:scale(.98)}
.star-row{display:flex;gap:8px;justify-content:center;margin:12px 0}
.star{font-size:28px;cursor:pointer;opacity:.4;transition:all .15s;background:none;border:none;color:#F4A261}
.star.active,.star:hover~.star{opacity:1}
.star:hover{transform:scale(1.2)}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

// ── Firebase REST ─────────────────────────────────────────────────────────────
const db={
  async get(path){try{const r=await fetch(`${FIREBASE_URL}/${path}.json`);if(!r.ok)return null;return await r.json();}catch{return null;}},
  async set(path,val){try{await fetch(`${FIREBASE_URL}/${path}.json`,{method:"PUT",body:JSON.stringify(val),headers:{"Content-Type":"application/json"}});}catch{}},
  async patch(path,val){try{await fetch(`${FIREBASE_URL}/${path}.json`,{method:"PATCH",body:JSON.stringify(val),headers:{"Content-Type":"application/json"}});}catch{}},
  async delete(path){try{await fetch(`${FIREBASE_URL}/${path}.json`,{method:"DELETE"});}catch{}}
};

// ── Poll data ─────────────────────────────────────────────────────────────────
const POLLS=[
  {id:"p1",phase:"opener",question:"Right now, my brain feels like...",options:[{id:"a",label:"🌊 A wave machine — thoughts everywhere"},{id:"b",label:"🧊 Frozen — can't pick where to start"},{id:"c",label:"⚡ Hyperfocused on one thing"},{id:"d",label:"🌤️ Actually pretty good today!"}],points:10,educational:null},
  {id:"p2",phase:"challenge",question:"Which of these hits closest for you at work?",options:[{id:"a",label:"Cognitive overload — too many inputs at once"},{id:"b",label:"Analysis paralysis — too many choices, can't start"},{id:"c",label:"Ambiguity anxiety — unclear briefs are my kryptonite"},{id:"d",label:"Context-switching cost — interruptions wreck me"}],points:10,educational:"All four are real ND challenges — and Microsoft tools can address each one directly."},
  {id:"p3",phase:"trivia",question:"True or False: Copilot in M365 can summarize a Teams meeting you missed.",options:[{id:"a",label:"✅ True — and it captures action items too"},{id:"b",label:"❌ False — it only works during live meetings"}],points:20,correct:"a",educational:"TRUE! Copilot can recap recorded meetings and pull out action items — huge for ND folks."},
  {id:"p4",phase:"trivia",question:"Which Microsoft Loop feature is most useful for reducing cognitive load?",options:[{id:"a",label:"Loop Pages — a live, always-synced workspace doc"},{id:"b",label:"Loop Components — embeddable tables in Teams/Outlook"},{id:"c",label:"Both equally — for different use cases"},{id:"d",label:"Neither — Loop isn't great for this"}],points:20,correct:"c",educational:"Both! Pages = external working memory. Components = inline task lists that sync everywhere."},
  {id:"p5",phase:"trivia",question:"What's the ND-friendliest way to use Planner?",options:[{id:"a",label:"One giant list of everything you need to do"},{id:"b",label:"Buckets by energy level: High / Medium / Low focus"},{id:"c",label:"Due-date sorted, most urgent first"},{id:"d",label:"By project only, no other categories"}],points:20,correct:"b",educational:"Energy bucketing! Matching tasks to your actual cognitive state means you work WITH your brain."},
  {id:"p6",phase:"reflection",question:"After today, what's the ONE thing you'll try this week?",options:[{id:"a",label:"🤖 Try a Copilot prompt for something I've been avoiding"},{id:"b",label:"📝 Set up a Loop page as my project brain dump"},{id:"c",label:"📅 Block 2 focus hours on my calendar — today"},{id:"d",label:"🔕 Put Teams on notification diet"}],points:15,educational:null},
];

// ── Pulse poll definitions ────────────────────────────────────────────────────
// pre_ = before session, post_ = after session
const PULSE_PRE=[
  {id:"pre_ai",   question:"How confident are you using AI tools in your day-to-day work?",   scale:5, label:["Not at all","","","","Very confident"]},
  {id:"pre_wl",   question:"How manageable does your workload feel right now?",                scale:5, label:["Completely overwhelmed","","","","Totally on top of it"]},
  {id:"pre_nd",   question:"How well does your current workflow match how your brain works?",  scale:5, label:["Not at all","","","","Really well"]},
];
const PULSE_POST=[
  {id:"post_ai",  question:"How confident do you feel about using AI tools after today?",     scale:5, label:["Not at all","","","","Very confident"]},
  {id:"post_wl",  question:"How manageable does your workload feel after this session?",       scale:5, label:["Still overwhelmed","","","","More optimistic"]},
  {id:"post_nd",  question:"How useful was today's session for how you actually work?",        scale:5, label:["Not useful","","","","Extremely useful"]},
  {id:"post_rec", question:"Would you recommend this session to a colleague?",                 options:[{id:"a",label:"✅ Absolutely"},{id:"b",label:"🤔 Maybe"},{id:"c",label:"❌ Probably not"}]},
];

const TKQ=[
  {id:"q1",question:"Your biggest daily struggle is...",options:[{id:"a",label:"Starting things — blank page panic",tools:["copilot","loop"]},{id:"b",label:"Staying organised across projects",tools:["planner","loop"]},{id:"c",label:"Keeping up with Teams/email chaos",tools:["teams","outlook"]},{id:"d",label:"Remembering what was decided in meetings",tools:["copilot","teams"]}]},
  {id:"q2",question:"When you get a vague request, you...",options:[{id:"a",label:"Freeze and procrastinate",tools:["copilot"]},{id:"b",label:"Ask lots of clarifying questions",tools:["loop"]},{id:"c",label:"Just start and figure it out",tools:["planner"]},{id:"d",label:"Worry about it until the deadline",tools:["outlook"]}]},
  {id:"q3",question:"You do your best work...",options:[{id:"a",label:"In long uninterrupted blocks",tools:["outlook","teams"]},{id:"b",label:"In short focused sprints",tools:["planner"]},{id:"c",label:"Collaboratively with others",tools:["loop","teams"]},{id:"d",label:"Async, on my own schedule",tools:["copilot","outlook"]}]},
];

const TOOLS={
  copilot:{name:"Microsoft Copilot",emoji:"🤖",color:"#00B4D8",tip:"Try: 'Help me figure out which lightweight workflows will work best for how MY brain operates.' Don't wait 6 months like I did.",badge:"Your AI Thinking Partner"},
  loop:   {name:"Microsoft Loop",   emoji:"🔄",color:"#7B2FBE",tip:"Open a Loop page every morning. Brain dump everything. The visualisation matches how your brain maps things.",badge:"Your External Brain"},
  planner:{name:"Microsoft Planner",emoji:"📋",color:"#06D6A0",tip:"Create three buckets: High Focus / Medium / Low Energy. Match tasks to how your brain is actually operating today.",badge:"Your Task Tamer"},
  teams:  {name:"Microsoft Teams",  emoji:"💬",color:"#2B7BB9",tip:"Notification diet: mute everything except @mentions and DMs. Check on YOUR schedule — the defaults weren't built for ND brains.",badge:"Your Async HQ"},
  outlook:{name:"Microsoft Outlook",emoji:"📅",color:"#F4A261",tip:"Block 2-hour focus windows daily. Treat them like meetings — with yourself.",badge:"Your Time Protector"},
};

const NAV="#0F1E45";
const CARD="rgba(26,47,107,0.6)";

// ── Shared components ─────────────────────────────────────────────────────────
function Btn({children,onClick,style,disabled}){
  return <button className="btn" onClick={onClick} disabled={disabled} style={style}>{children}</button>;
}
function Card({children,style}){
  return <div style={{background:CARD,border:"1px solid rgba(0,180,216,.2)",borderRadius:16,...style}}>{children}</div>;
}
function Confetti(){
  const p=Array.from({length:25},(_,i)=>({id:i,color:["#00B4D8","#F4A261","#06D6A0","#EF476F","#7B2FBE"][i%5],left:Math.random()*100,delay:Math.random(),dur:2+Math.random()*1.5,size:6+Math.random()*8,round:Math.random()>.5}));
  return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999,overflow:"hidden"}}>{p.map(x=><div key={x.id} style={{position:"absolute",left:`${x.left}%`,top:-10,width:x.size,height:x.size,background:x.color,borderRadius:x.round?"50%":"2px",animation:`fall ${x.dur}s ${x.delay}s linear forwards`}}/>)}</div>;
}

// ── Star rating component ─────────────────────────────────────────────────────
function StarRating({value,onChange,max=5}){
  const[hover,setHover]=useState(0);
  return(
    <div className="star-row">
      {Array.from({length:max},(_,i)=>i+1).map(n=>(
        <button key={n} className={`star${(hover||value)>=n?" active":""}`}
          onClick={()=>onChange(n)}
          onMouseEnter={()=>setHover(n)}
          onMouseLeave={()=>setHover(0)}>★</button>
      ))}
    </div>
  );
}

// ── Pulse poll screen (pre or post) ──────────────────────────────────────────
function PulsePollScreen({questions,title,subtitle,color,onDone,name,prefix}){
  const[idx,setIdx]=useState(0);
  const[answers,setAnswers]=useState({});

  const q=questions[idx];
  const isLast=idx===questions.length-1;

  const answer=(qid,val)=>{
    const next={...answers,[qid]:val};
    setAnswers(next);
    if(isLast){
      // Save to Firebase under pulse/[prefix]/[name]
      db.patch(`pulse/${prefix}/${encodeURIComponent(name)}`,next);
      onDone(next);
    } else {
      setTimeout(()=>setIdx(i=>i+1),350);
    }
  };

  return(
    <div style={{minHeight:"100vh",background:NAV,padding:20,maxWidth:500,margin:"0 auto",color:"#fff"}}>
      <div style={{marginBottom:20}}>
        <div className="syne" style={{fontSize:16,color,marginBottom:4}}>{title}</div>
        <div style={{fontSize:12,color:"#7B8FB0"}}>{subtitle} · {idx+1} of {questions.length}</div>
        <div className="bar" style={{marginTop:8}}>
          <div className="fill" style={{width:`${((idx)/questions.length)*100}%`,background:`linear-gradient(90deg,${color},#00B4D8)`}}/>
        </div>
      </div>

      <Card className="fade" style={{padding:24,marginBottom:16}} key={q.id}>
        <div className="syne" style={{fontSize:16,lineHeight:1.5,marginBottom:16,textAlign:"center"}}>{q.question}</div>
        {q.scale?(
          <>
            <StarRating value={answers[q.id]||0} onChange={v=>answer(q.id,v)} max={q.scale}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#7B8FB0",marginTop:6,padding:"0 4px"}}>
              <span>{q.label[0]}</span><span>{q.label[q.label.length-1]}</span>
            </div>
            {answers[q.id]&&(
              <div style={{textAlign:"center",marginTop:12}}>
                <Btn onClick={()=>answer(q.id,answers[q.id])} style={{background:color,color:NAV,padding:"8px 24px",fontSize:13}}>
                  {isLast?"Submit →":"Next →"}
                </Btn>
              </div>
            )}
          </>
        ):(
          q.options.map(opt=>(
            <button key={opt.id} className={`opt${answers[q.id]===opt.id?" sel":""}`}
              onClick={()=>answer(q.id,opt.id)}>{opt.label}</button>
          ))
        )}
      </Card>
    </div>
  );
}

// ── CSV Export ────────────────────────────────────────────────────────────────
function buildCSV(players,pulseData){
  const list=Object.values(players).sort((a,b)=>(b.score||0)-(a.score||0));
  const pre=pulseData?.pre||{};
  const post=pulseData?.post||{};

  // Helper: avg of a pulse question across all respondents
  const avg=(data,qid)=>{
    const vals=Object.values(data).map(r=>r[qid]).filter(v=>typeof v==="number");
    if(!vals.length)return"—";
    return(vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(1);
  };

  const rows=[
    ["Session Results — From Overwhelm to Outcomes"],
    ["Generated",new Date().toLocaleString()],
    ["Total players",list.length],
    [""],
    ["=== PULSE: BEFORE vs AFTER ==="],
    ["Metric","Pre-session avg","Post-session avg","Change"],
    ["AI tool confidence",avg(pre,"pre_ai"),avg(post,"post_ai"),""],
    ["Workload manageability",avg(pre,"pre_wl"),avg(post,"post_wl"),""],
    ["Workflow-brain fit",avg(pre,"pre_nd"),avg(post,"post_nd"),""],
    ["Session usefulness","—",avg(post,"post_nd"),""],
    [""],
    ["=== WOULD RECOMMEND? ==="],
    ["Response","Count"],
    ...["a","b","c"].map(id=>{
      const label=id==="a"?"Yes":id==="b"?"Maybe":"No";
      const cnt=Object.values(post).filter(r=>r.post_rec===id).length;
      return[label,cnt];
    }),
    [""],
    ["=== LEADERBOARD ==="],
    ["Rank","Name","Score","Toolkit Match","Pre AI","Pre Workload","Pre Fit","Post AI","Post Workload","Post Usefulness","Recommend",...POLLS.map((_,i)=>`Q${i+1}`)],
    ...list.map((p,i)=>{
      const pn=encodeURIComponent(p.name);
      const pr=pre[pn]||{};const po=post[pn]||{};
      return[
        i+1,p.name,p.score||0,p.toolkit||"—",
        pr.pre_ai||"—",pr.pre_wl||"—",pr.pre_nd||"—",
        po.post_ai||"—",po.post_wl||"—",po.post_nd||"—",
        po.post_rec==="a"?"Yes":po.post_rec==="b"?"Maybe":po.post_rec==="c"?"No":"—",
        ...POLLS.map(poll=>{
          const a=p.answers?.[poll.id];
          if(!a)return"—";
          const opt=poll.options.find(o=>o.id===a);
          return opt?opt.label.replace(/,/g,""):a;
        })
      ];
    }),
    [""],
    ["=== POLL RESPONSE TOTALS ==="],
    ["Question","Option","Responses","Percent"],
    ...POLLS.flatMap(poll=>{
      const votes={};
      list.forEach(p=>{const a=p.answers?.[poll.id];if(a)votes[a]=(votes[a]||0)+1;});
      const total=Object.values(votes).reduce((s,v)=>s+v,0);
      return poll.options.map(opt=>{
        const cnt=votes[opt.id]||0;
        const pct=total>0?Math.round(cnt/total*100):0;
        return[poll.question.replace(/,/g,""),opt.label.replace(/,/g,""),cnt,`${pct}%`];
      });
    }),
    [""],
    ["=== TOOLKIT MATCHES ==="],
    ["Name","Toolkit","Badge"],
    ...list.filter(p=>p.toolkit).map(p=>{
      const t=Object.values(TOOLS).find(x=>x.name===p.toolkit);
      return[p.name,p.toolkit,t?t.badge:""];
    })
  ];
  return rows.map(r=>r.join(",")).join("\n");
}

function downloadCSV(csv){
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`ND_Session_Results_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(url);
}

// ── HOST VIEW ─────────────────────────────────────────────────────────────────
function HostView(){
  const[gs,setGs]=useState(null);
  const[players,setPlayers]=useState({});
  const[pulse,setPulse]=useState({});
  const[tab,setTab]=useState("controls");
  const[exporting,setExporting]=useState(false);
  const iv=useRef(null);

  const refresh=useCallback(async()=>{
    const[g,p,pu]=await Promise.all([db.get("gamestate"),db.get("players"),db.get("pulse")]);
    if(g)setGs(g);
    setPlayers(p||{});
    setPulse(pu||{});
  },[]);

  useEffect(()=>{
    (async()=>{
      let g=await db.get("gamestate");
      if(!g){g={phase:"lobby",activePoll:null,revealed:{},pulsePre:false,pulsePost:false};await db.set("gamestate",g);}
      setGs(g);
      setPlayers((await db.get("players"))||{});
      setPulse((await db.get("pulse"))||{});
    })();
    iv.current=setInterval(refresh,2000);
    return()=>clearInterval(iv.current);
  },[refresh]);

  const update=async(next)=>{await db.set("gamestate",next);setGs(next);};

  const handleExport=async()=>{
    setExporting(true);
    const[p,pu]=await Promise.all([db.get("players"),db.get("pulse")]);
    downloadCSV(buildCSV(p||{},pu||{}));
    setTimeout(()=>setExporting(false),1500);
  };

  const playerList=Object.values(players).sort((a,b)=>(b.score||0)-(a.score||0));
  const activePoll=gs?.activePoll?POLLS.find(p=>p.id===gs.activePoll):null;
  const votes={};
  if(activePoll)playerList.forEach(pl=>{const a=pl.answers?.[activePoll.id];if(a)votes[a]=(votes[a]||0)+1;});
  const totalVotes=Object.values(votes).reduce((a,b)=>a+b,0);

  // Pulse response counts
  const preCount=Object.keys(pulse?.pre||{}).length;
  const postCount=Object.keys(pulse?.post||{}).length;

  if(!gs)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:NAV}}>
      <div style={{textAlign:"center",color:"#7B8FB0"}}><div style={{fontSize:32,marginBottom:12}}>⏳</div>Connecting...</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:NAV,padding:20,color:"#fff"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div>
          <div className="syne" style={{fontSize:18,color:"#00B4D8"}}>🧠 Host Dashboard</div>
          <div style={{fontSize:12,color:"#7B8FB0",marginTop:2}}>{playerList.length} players · Phase: <span style={{color:"#F4A261",fontWeight:600}}>{gs.phase}</span> · Pulse: <span style={{color:"#06D6A0"}}>{preCount} pre / {postCount} post</span></div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn onClick={()=>setTab(t=>t==="controls"?"leaderboard":"controls")} style={{background:"rgba(0,180,216,.12)",color:"#00B4D8",border:"1px solid rgba(0,180,216,.3)"}}>
            {tab==="controls"?"🏆 Leaderboard":"🎮 Controls"}
          </Btn>
          <Btn onClick={handleExport} disabled={playerList.length===0} style={{background:"rgba(6,214,160,.15)",color:"#06D6A0",border:"1px solid rgba(6,214,160,.3)"}}>
            {exporting?"⬇️ Saving...":"⬇️ Export CSV"}
          </Btn>
          <Btn onClick={async()=>{if(!confirm("Reset ALL players, scores and pulse data?"))return;await db.set("gamestate",{phase:"lobby",activePoll:null,revealed:{},pulsePre:false,pulsePost:false});await db.delete("players");await db.delete("pulse");refresh();}} style={{background:"rgba(239,71,111,.15)",color:"#EF476F",border:"1px solid rgba(239,71,111,.3)"}}>Reset</Btn>
        </div>
      </div>

      <Card style={{padding:"12px 16px",marginBottom:14}}>
        <div style={{fontSize:11,color:"#00B4D8",fontWeight:700,letterSpacing:.5,marginBottom:8}}>PLAYERS IN LOBBY</div>
        {playerList.length===0
          ?<div style={{fontSize:13,color:"#7B8FB0"}}>No players yet — share this page URL with your audience</div>
          :<div>{playerList.map(p=><span key={p.name} style={{display:"inline-block",background:"rgba(0,180,216,.12)",border:"1px solid rgba(0,180,216,.25)",borderRadius:20,padding:"3px 10px",margin:"3px",fontSize:12,color:"#00B4D8"}}>{p.name}</span>)}</div>
        }
      </Card>

      {tab==="controls"?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <Card style={{padding:18}}>
            {/* Pulse controls */}
            <div style={{fontSize:13,color:"#F4A261",fontWeight:700,marginBottom:10}}>🔆 Pulse Controls</div>
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
              <Btn
                onClick={()=>update({...gs,pulsePre:!gs.pulsePre})}
                style={{background:gs.pulsePre?"rgba(244,162,97,.3)":"rgba(244,162,97,.12)",color:"#F4A261",border:"1px solid rgba(244,162,97,.4)",fontSize:12,flex:1}}>
                {gs.pulsePre?"✅ Pre-pulse LIVE":"▶ Launch Pre-pulse"}
              </Btn>
              <Btn
                onClick={()=>update({...gs,pulsePost:!gs.pulsePost})}
                style={{background:gs.pulsePost?"rgba(6,214,160,.3)":"rgba(6,214,160,.12)",color:"#06D6A0",border:"1px solid rgba(6,214,160,.4)",fontSize:12,flex:1}}>
                {gs.pulsePost?"✅ Post-pulse LIVE":"▶ Launch Post-pulse"}
              </Btn>
            </div>
            <div style={{fontSize:11,color:"#7B8FB0",marginBottom:14,lineHeight:1.6}}>
              Pre-pulse: launch while people are joining (lobby screen).<br/>
              Post-pulse: launch after Toolkit Builder, before closing.
            </div>

            {/* Poll controls */}
            <div style={{fontSize:13,color:"#00B4D8",fontWeight:700,marginBottom:10}}>📊 Poll Controls</div>
            {POLLS.map((poll,i)=>{
              const isActive=gs.activePoll===poll.id;
              const isRevealed=gs.revealed?.[poll.id];
              const vc=playerList.filter(p=>p.answers?.[poll.id]).length;
              return(
                <div key={poll.id} style={{padding:"9px 11px",borderRadius:10,background:isActive?"rgba(0,180,216,.15)":"rgba(26,47,107,.4)",border:`1px solid ${isActive?"#00B4D8":"rgba(255,255,255,.08)"}`,marginBottom:7}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:"#7B8FB0",marginBottom:2}}>Q{i+1} · {poll.phase} · {poll.points}pts{poll.correct?" · TRIVIA":""}</div>
                      <div style={{fontSize:12,fontWeight:500,lineHeight:1.3}}>{poll.question.slice(0,55)}{poll.question.length>55?"...":""}</div>
                      {vc>0&&<div style={{fontSize:10,color:"#00B4D8",marginTop:3}}>{vc} voted</div>}
                    </div>
                    <div style={{display:"flex",gap:5,flexShrink:0}}>
                      {!isActive&&<Btn onClick={()=>update({...gs,phase:"poll",activePoll:poll.id,revealed:gs.revealed||{}})} style={{background:"#00B4D8",color:NAV,fontSize:10,padding:"5px 9px"}}>Launch</Btn>}
                      {isActive&&!isRevealed&&poll.correct&&<Btn onClick={()=>update({...gs,revealed:{...(gs.revealed||{}),[poll.id]:true}})} style={{background:"#F4A261",color:NAV,fontSize:10,padding:"5px 9px"}}>Reveal</Btn>}
                      {isActive&&<Btn onClick={()=>update({...gs,phase:"lobby",activePoll:null})} style={{background:"rgba(239,71,111,.3)",color:"#EF476F",fontSize:10,padding:"5px 9px"}}>End</Btn>}
                    </div>
                  </div>
                </div>
              );
            })}
            <Btn onClick={()=>update({...gs,phase:"toolkit"})} style={{width:"100%",marginTop:10,background:"linear-gradient(135deg,#7B2FBE,#9B59B6)",color:"#fff",padding:"11px",fontSize:13}}>🔬 Launch Toolkit Builder</Btn>
          </Card>

          <Card style={{padding:18}}>
            <div style={{fontSize:13,color:"#F4A261",fontWeight:700,marginBottom:10}}>📈 Live Results</div>
            {activePoll?(
              <>
                <div style={{fontSize:11,color:"#7B8FB0",marginBottom:8}}>{activePoll.question.slice(0,60)}...</div>
                {activePoll.options.map(opt=>{
                  const cnt=votes[opt.id]||0,pct=totalVotes>0?Math.round(cnt/totalVotes*100):0;
                  const isC=activePoll.correct===opt.id,rev=gs.revealed?.[activePoll.id];
                  return(
                    <div key={opt.id} style={{marginBottom:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                        <span style={{color:rev&&isC?"#06D6A0":"#fff"}}>{rev&&isC?"✅ ":""}{opt.label}</span>
                        <span style={{color:"#00B4D8",fontWeight:600}}>{cnt} ({pct}%)</span>
                      </div>
                      <div className="bar"><div className="fill" style={{width:`${pct}%`,background:rev&&isC?"#06D6A0":undefined}}/></div>
                    </div>
                  );
                })}
                <div style={{fontSize:11,color:"#7B8FB0",marginTop:6}}>Responses: {totalVotes}/{playerList.length}</div>
                {activePoll.educational&&gs.revealed?.[activePoll.id]&&(
                  <div style={{marginTop:10,padding:"10px 12px",background:"rgba(6,214,160,.1)",borderRadius:8,border:"1px solid rgba(6,214,160,.3)",fontSize:12,color:"#06D6A0",lineHeight:1.5}}>💡 {activePoll.educational}</div>
                )}
              </>
            ):<div style={{color:"#7B8FB0",fontSize:13,textAlign:"center",padding:"20px 0"}}>Launch a poll to see live results</div>}

            {/* Pulse summary */}
            {(preCount>0||postCount>0)&&(
              <div style={{marginTop:16,borderTop:"1px solid rgba(255,255,255,.08)",paddingTop:14}}>
                <div style={{fontSize:11,color:"#F4A261",fontWeight:700,marginBottom:8}}>🔆 Pulse Snapshot</div>
                {["pre_ai","pre_wl","pre_nd"].map(qid=>{
                  const label={pre_ai:"AI confidence",pre_wl:"Workload",pre_nd:"Workflow fit"}[qid];
                  const preVals=Object.values(pulse?.pre||{}).map(r=>r[qid]).filter(v=>typeof v==="number");
                  const postQid=qid.replace("pre_","post_");
                  const postVals=Object.values(pulse?.post||{}).map(r=>r[postQid]).filter(v=>typeof v==="number");
                  const preAvg=preVals.length?(preVals.reduce((s,v)=>s+v,0)/preVals.length).toFixed(1):"—";
                  const postAvg=postVals.length?(postVals.reduce((s,v)=>s+v,0)/postVals.length).toFixed(1):"—";
                  const delta=preAvg!=="—"&&postAvg!=="—"?(postAvg-preAvg).toFixed(1):null;
                  return(
                    <div key={qid} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6,alignItems:"center"}}>
                      <span style={{color:"#7B8FB0"}}>{label}</span>
                      <span>
                        <span style={{color:"#F4A261"}}>{preAvg}</span>
                        <span style={{color:"#7B8FB0"}}> → </span>
                        <span style={{color:"#06D6A0"}}>{postAvg}</span>
                        {delta&&<span style={{color:delta>0?"#06D6A0":"#EF476F",marginLeft:6}}>{delta>0?"+":""}{delta}</span>}
                      </span>
                    </div>
                  );
                })}
              </div>
            )}
          </Card>
        </div>
      ):(
        <Card style={{padding:24,maxWidth:520,margin:"0 auto"}}>
          <div className="syne" style={{fontSize:18,textAlign:"center",color:"#F4A261",marginBottom:18}}>🏆 Leaderboard</div>
          {playerList.length===0
            ?<div style={{textAlign:"center",color:"#7B8FB0",padding:"20px 0"}}>No players yet</div>
            :playerList.map((p,i)=>(
              <div key={p.name} className={`lbrow${i===0?" gold":""}`}>
                <div style={{fontFamily:"Syne",fontWeight:800,fontSize:16,width:26,color:i===0?"#F4A261":i===1?"#C0C0C0":i===2?"#CD7F32":"#7B8FB0"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}</div>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{p.name}</div>{p.toolkit&&<div style={{fontSize:10,color:"#00B4D8"}}>🔧 {p.toolkit}</div>}</div>
                <div style={{fontFamily:"Syne",fontWeight:800,fontSize:16,color:i===0?"#F4A261":"#00B4D8"}}>{p.score||0}</div>
              </div>
            ))
          }
        </Card>
      )}
    </div>
  );
}

// ── PLAYER VIEW (live session) ────────────────────────────────────────────────
function PlayerView(){
  const[screen,setScreen]=useState("join");
  const[name,setName]=useState("");
  const[gs,setGs]=useState(null);
  const[me,setMe]=useState(null);
  const[tkStep,setTkStep]=useState(0);
  const[tkAns,setTkAns]=useState({});
  const[tkResult,setTkResult]=useState(null);
  const[confetti,setConfetti]=useState(false);
  const[preDone,setPreDone]=useState(false);
  const[postDone,setPostDone]=useState(false);
  const iv=useRef(null);
  const nameRef=useRef("");
  const screenRef=useRef("join");
  const preDoneRef=useRef(false);
  const postDoneRef=useRef(false);

  useEffect(()=>{nameRef.current=name;},[name]);
  useEffect(()=>{screenRef.current=screen;},[screen]);
  useEffect(()=>{preDoneRef.current=preDone;},[preDone]);
  useEffect(()=>{postDoneRef.current=postDone;},[postDone]);

  useEffect(()=>{
    iv.current=setInterval(async()=>{
      const[g,players]=await Promise.all([db.get("gamestate"),db.get("players")]);
      if(g)setGs({...g,revealed:g.revealed||{}});
      if(nameRef.current&&players?.[nameRef.current])setMe({...players[nameRef.current],answers:players[nameRef.current].answers||{}});
      if(!g||!nameRef.current)return;
      const s=screenRef.current;
      // Pulse pre: show on waiting screen if host enabled and not done
      if(s==="waiting"&&g.pulsePre&&!preDoneRef.current)setScreen("pulse_pre");
      // Dismiss pulse pre if host turned it off
      if(s==="pulse_pre"&&!g.pulsePre)setScreen("waiting");
      // Post pulse: show after toolkit result if host enabled and not done
      if(s==="result"&&g.pulsePost&&!postDoneRef.current)setScreen("pulse_post");
      if(s==="waiting"&&g.phase==="poll")setScreen("poll");
      if(s==="poll"&&g.phase==="lobby")setScreen("waiting");
      if(["waiting","poll"].includes(s)&&g.phase==="toolkit")setScreen("toolkit");
    },2000);
    return()=>clearInterval(iv.current);
  },[]);

  const pop=()=>{setConfetti(true);setTimeout(()=>setConfetti(false),2500);};

  const join=async()=>{
    const n=name.trim();if(!n)return;
    const players=(await db.get("players"))||{};
    if(!players[n]){players[n]={name:n,score:0,answers:{},joinedAt:Date.now(),mode:"live"};}
    await db.set("players",players);
    setMe(players[n]);
    const g=await db.get("gamestate");setGs(g);
    if(g?.phase==="poll")setScreen("poll");
    else if(g?.phase==="toolkit")setScreen("toolkit");
    else setScreen("waiting");
  };

  const answer=async(pollId,optId)=>{
    const poll=POLLS.find(p=>p.id===pollId);
    const players=(await db.get("players"))||{};
    const me2=players[name]||{name,score:0,answers:{}};
    if(!me2.answers)me2.answers={};
    if(me2.answers[pollId])return;
    const earned=poll.correct?(poll.correct===optId?poll.points:0):poll.points;
    me2.answers[pollId]=optId;me2.score=(me2.score||0)+earned;
    players[name]=me2;
    await db.set("players",players);
    setMe({...me2});
    if(earned>0)pop();
  };

  const finishToolkit=async(finalAns)=>{
    const ans=finalAns||tkAns;
    const scores={copilot:0,loop:0,planner:0,teams:0,outlook:0};
    TKQ.forEach(q=>{const opt=q.options.find(o=>o.id===ans[q.id]);if(opt)opt.tools.forEach(t=>{scores[t]=(scores[t]||0)+1;});});
    const topTool=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
    const tool=TOOLS[topTool];
    const players=(await db.get("players"))||{};
    const me2=players[name]||{name,score:0,answers:{}};
    me2.toolkit=tool.name;me2.score=(me2.score||0)+25;
    players[name]=me2;
    await db.set("players",players);
    setMe({...me2});
    setTkResult({...tool,scores});
    setScreen("result");pop();
  };

  const poll=gs?.activePoll?POLLS.find(p=>p.id===gs.activePoll):null;
  const myAns=poll?me?.answers?.[poll.id]:null;
  const revealed=poll?gs?.revealed?.[poll.id]:false;

  const wrap=(children)=>(
    <div style={{minHeight:"100vh",background:NAV,padding:20,color:"#fff",maxWidth:480,margin:"0 auto",position:"relative"}}>
      {confetti&&<Confetti/>}
      {children}
    </div>
  );

  if(screen==="join")return wrap(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",margin:-20}}>
      <div className="fade" style={{background:CARD,border:"1px solid rgba(0,180,216,.2)",borderRadius:16,padding:36,width:"100%",maxWidth:400,textAlign:"center",margin:20}}>
        <div style={{fontSize:44,marginBottom:12}}>🧠</div>
        <div className="syne" style={{fontSize:22,lineHeight:1.2,marginBottom:6}}>From Overwhelm<br/><span style={{color:"#00B4D8"}}>to Outcomes</span></div>
        <div style={{color:"#7B8FB0",fontSize:13,marginBottom:24}}>Neurodiversity Celebration Week</div>
        <input type="text" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&join()} placeholder="Your name or nickname"/>
        <Btn onClick={join} disabled={!name.trim()} style={{width:"100%",padding:"13px",fontSize:15,background:name.trim()?"#00B4D8":"rgba(0,180,216,.2)",color:NAV}}>Join Session →</Btn>
        <div style={{marginTop:16,fontSize:11,color:"#7B8FB0"}}>Points earned for every response · 🎁 Top scorer wins a 1:1 to build their own AI Operating System</div>
      </div>
    </div>
  );

  if(screen==="pulse_pre")return(
    <PulsePollScreen
      questions={PULSE_PRE}
      title="Quick check-in before we start"
      subtitle="3 questions · takes 60 seconds"
      color="#F4A261"
      name={name}
      prefix="pre"
      onDone={()=>{setPreDone(true);setScreen("waiting");}}
    />
  );

  if(screen==="pulse_post")return(
    <PulsePollScreen
      questions={PULSE_POST}
      title="Quick check-out before you go"
      subtitle="4 questions · takes 60 seconds"
      color="#06D6A0"
      name={name}
      prefix="post"
      onDone={()=>{setPostDone(true);setScreen("done");}}
    />
  );

  if(screen==="waiting")return wrap(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",margin:-20}}>
      <div style={{textAlign:"center"}} className="fade">
        <div style={{fontSize:48,marginBottom:14}}>⏳</div>
        <div className="syne" style={{fontSize:20,marginBottom:6}}>You're in, {name}!</div>
        <div style={{color:"#7B8FB0",fontSize:13,marginBottom:18}}>Waiting for the host to start the next activity...</div>
        <Card style={{display:"inline-block",padding:"12px 24px"}}>
          <span style={{color:"#F4A261",fontSize:20,fontWeight:700}}>{me?.score||0}</span>
          <span style={{color:"#7B8FB0",fontSize:13}}> points so far</span>
        </Card>
      </div>
    </div>
  );

  if(screen==="done")return wrap(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",margin:-20}}>
      <div style={{textAlign:"center"}} className="fade">
        <div style={{fontSize:48,marginBottom:14}}>✅</div>
        <div className="syne" style={{fontSize:20,marginBottom:6,color:"#06D6A0"}}>All done, {name}!</div>
        <div style={{color:"#7B8FB0",fontSize:13,marginBottom:18}}>Thanks for your feedback.</div>
        <Card style={{display:"inline-block",padding:"12px 24px"}}>
          <span style={{color:"#F4A261",fontSize:20,fontWeight:700}}>{me?.score||0}</span>
          <span style={{color:"#7B8FB0",fontSize:13}}> final points</span>
        </Card>
      </div>
    </div>
  );

  if(screen==="poll"&&poll)return wrap(
    <>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div className="syne" style={{fontSize:13,color:"#00B4D8"}}>{name}</div>
        <Card style={{padding:"5px 12px",fontSize:13}}><span style={{color:"#F4A261",fontWeight:700}}>{me?.score||0}</span> pts</Card>
      </div>
      <Card className="fade" style={{padding:20,marginBottom:14}}>
        <div style={{fontSize:10,color:"#00B4D8",fontWeight:700,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>
          {poll.phase==="trivia"?`⚡ TRIVIA · ${poll.points} pts`:`💬 Poll · ${poll.points} pts`}
        </div>
        <div className="syne" style={{fontSize:17,lineHeight:1.4}}>{poll.question}</div>
      </Card>
      {poll.options.map(opt=>{
        let cls="opt";
        if(myAns){cls+=" done";if(revealed&&poll.correct){if(opt.id===poll.correct)cls+=" correct";else if(opt.id===myAns)cls+=" wrong";}else if(opt.id===myAns)cls+=" sel";}
        return <button key={opt.id} className={cls} onClick={()=>!myAns&&answer(poll.id,opt.id)}>{opt.label}</button>;
      })}
      {myAns&&!revealed&&<div style={{textAlign:"center",color:"#00B4D8",fontSize:13,marginTop:12}}>✅ Locked in! Waiting for others...</div>}
      {revealed&&poll.educational&&(
        <Card style={{marginTop:14,padding:"14px 16px",borderColor:"rgba(6,214,160,.3)",background:"rgba(6,214,160,.08)"}}>
          <div style={{fontSize:11,color:"#06D6A0",fontWeight:700,marginBottom:5}}>💡 Did you know?</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,.85)",lineHeight:1.6}}>{poll.educational}</div>
        </Card>
      )}
      {revealed&&poll.correct&&myAns===poll.correct&&(
        <div style={{textAlign:"center",marginTop:10}}><span className="syne" style={{fontSize:18,color:"#F4A261"}}>+{poll.points} pts! 🎉</span></div>
      )}
    </>
  );

  if(screen==="toolkit"){
    const q=TKQ[tkStep];
    return wrap(
      <>
        <div style={{marginBottom:20}}>
          <div className="syne" style={{fontSize:16,color:"#7B2FBE",marginBottom:4}}>🔬 Build Your ND Toolkit</div>
          <div style={{fontSize:12,color:"#7B8FB0"}}>Step {tkStep+1} of {TKQ.length} · +25 bonus points</div>
          <div className="bar" style={{marginTop:8}}><div className="fill" style={{width:`${(tkStep/TKQ.length)*100}%`,background:"linear-gradient(90deg,#7B2FBE,#00B4D8)"}}/></div>
        </div>
        <Card className="fade" style={{padding:20,marginBottom:14}} key={tkStep}>
          <div className="syne" style={{fontSize:16,lineHeight:1.4}}>{q.question}</div>
        </Card>
        {q.options.map(opt=>(
          <button key={opt.id} className={`opt${tkAns[q.id]===opt.id?" sel":""}`} onClick={()=>{
            const next={...tkAns,[q.id]:opt.id};setTkAns(next);
            setTimeout(()=>{if(tkStep<TKQ.length-1)setTkStep(s=>s+1);else finishToolkit(next);},300);
          }}>{opt.label}</button>
        ))}
      </>
    );
  }

  if(screen==="result"&&tkResult){
    const tool=tkResult;const max=TKQ.length*2;
    return wrap(
      <>
        <div style={{textAlign:"center",marginBottom:20}} className="fade">
          <div className="syne" style={{fontSize:20,color:"#F4A261"}}>Your ND Toolkit Match! 🎉</div>
        </div>
        <Card className="fade" style={{padding:24,textAlign:"center",borderColor:tool.color,background:"rgba(0,0,0,.15)",marginBottom:14}}>
          <div style={{fontSize:48,marginBottom:8}}>{tool.emoji}</div>
          <div style={{fontSize:11,letterSpacing:2,color:tool.color,fontWeight:700,marginBottom:4}}>YOUR PRIMARY TOOL</div>
          <div className="syne" style={{fontSize:22,marginBottom:4}}>{tool.name}</div>
          <div style={{fontSize:12,color:tool.color,marginBottom:14}}>{tool.badge}</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,.8)",lineHeight:1.7,borderTop:"1px solid rgba(255,255,255,.1)",paddingTop:14}}>
            <strong>Your first step: </strong>{tool.tip}
          </div>
        </Card>
        <Card style={{padding:18,marginBottom:14}} className="fade">
          <div style={{fontSize:11,color:"#7B8FB0",marginBottom:10,fontWeight:600,letterSpacing:.5}}>YOUR TOOL AFFINITY</div>
          {Object.entries(tool.scores).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
            const t=TOOLS[k],pct=Math.round(v/max*100);
            return(<div key={k} style={{marginBottom:9}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span>{t.emoji} {t.name}</span><span style={{color:t.color}}>{pct}%</span></div>
              <div className="bar"><div className="fill" style={{width:`${pct}%`,background:t.color}}/></div>
            </div>);
          })}
        </Card>
        <Card style={{padding:14,textAlign:"center"}}>
          <div style={{color:"#F4A261",fontWeight:700,fontSize:15}}>Total Score: {me?.score||0} pts</div>
          <div style={{fontSize:11,color:"#7B8FB0",marginTop:4}}>Check the leaderboard on the main screen!</div>
        </Card>
      </>
    );
  }

  return wrap(<div style={{color:"#7B8FB0",padding:80,textAlign:"center"}}>Loading...</div>);
}

// ── SOLO VIEW ─────────────────────────────────────────────────────────────────
function SoloView(){
  const[screen,setScreen]=useState("join");
  const[name,setName]=useState("");
  const[step,setStep]=useState(0);
  const[answers,setAnswers]=useState({});
  const[showEdu,setShowEdu]=useState(null);
  const[tkStep,setTkStep]=useState(0);
  const[tkAns,setTkAns]=useState({});
  const[result,setResult]=useState(null);
  const[confetti,setConfetti]=useState(false);

  const pop=()=>{setConfetti(true);setTimeout(()=>setConfetti(false),2500);};

  const answerPoll=(pollId,optId)=>{
    if(answers[pollId])return;
    const poll=POLLS.find(p=>p.id===pollId);
    setAnswers(prev=>({...prev,[pollId]:optId}));
    if(poll.educational){setShowEdu({text:poll.educational,correct:poll.correct,chosen:optId,pollId});}
    else{setTimeout(()=>setStep(s=>s+1),400);}
  };

  const dismissEdu=()=>{setShowEdu(null);setStep(s=>s+1);};

  const finishToolkit=(finalAns)=>{
    const ans=finalAns||tkAns;
    const scores={copilot:0,loop:0,planner:0,teams:0,outlook:0};
    TKQ.forEach(q=>{const opt=q.options.find(o=>o.id===ans[q.id]);if(opt)opt.tools.forEach(t=>{scores[t]=(scores[t]||0)+1;});});
    const topTool=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
    db.get("players").then(players=>{
      const p=players||{};
      const sn=`${name} (solo)`;
      p[sn]={name:sn,score:0,answers,toolkit:TOOLS[topTool].name,joinedAt:Date.now(),mode:"solo"};
      db.set("players",p);
    });
    setResult({...TOOLS[topTool],scores,tool:topTool});
    setScreen("result");pop();
  };

  const wrap=(children)=>(
    <div style={{minHeight:"100vh",background:NAV,padding:20,color:"#fff",maxWidth:500,margin:"0 auto",position:"relative"}}>
      {confetti&&<Confetti/>}{children}
    </div>
  );

  if(screen==="join")return wrap(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",margin:-20}}>
      <div className="fade" style={{background:CARD,border:"1px solid rgba(0,180,216,.2)",borderRadius:16,padding:36,width:"100%",maxWidth:400,textAlign:"center",margin:20}}>
        <div style={{fontSize:44,marginBottom:12}}>🧠</div>
        <div className="syne" style={{fontSize:22,lineHeight:1.2,marginBottom:6}}>From Overwhelm<br/><span style={{color:"#00B4D8"}}>to Outcomes</span></div>
        <div style={{color:"#7B8FB0",fontSize:13,marginBottom:8}}>Self-paced reflection</div>
        <div style={{fontSize:12,color:"rgba(123,47,190,.9)",background:"rgba(123,47,190,.1)",border:"1px solid rgba(123,47,190,.3)",borderRadius:8,padding:"8px 12px",marginBottom:24,lineHeight:1.6}}>
          6 polls + trivia + your personalised tool match
        </div>
        <input type="text" value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&name.trim()){setName(name.trim());setScreen("pre_pulse");}}}
          placeholder="Your name or nickname"/>
        <Btn onClick={()=>{setName(name.trim());setScreen("pre_pulse");}} disabled={!name.trim()} style={{width:"100%",padding:"13px",fontSize:15,background:name.trim()?"#7B2FBE":"rgba(123,47,190,.2)",color:"#fff"}}>Start →</Btn>
      </div>
    </div>
  );

  if(screen==="pre_pulse")return(
    <PulsePollScreen
      questions={PULSE_PRE}
      title="Quick check-in before we start"
      subtitle="3 questions · 60 seconds"
      color="#F4A261"
      name={name}
      prefix="pre"
      onDone={()=>setScreen("poll")}
    />
  );

  if(screen==="poll"){
    if(step>=POLLS.length){setTimeout(()=>setScreen("toolkit"),100);return null;}
    const poll=POLLS[step];const myAns=answers[poll.id];
    return wrap(
      <>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div className="syne" style={{fontSize:13,color:"#7B2FBE"}}>{name} · Solo</div>
          <div style={{fontSize:12,color:"#7B8FB0"}}>{step+1} of {POLLS.length}</div>
        </div>
        <div className="bar" style={{marginBottom:16}}><div className="fill" style={{width:`${(step/POLLS.length)*100}%`,background:"linear-gradient(90deg,#7B2FBE,#00B4D8)"}}/></div>
        <Card className="fade" style={{padding:20,marginBottom:14}} key={step}>
          <div style={{fontSize:10,color:"#7B2FBE",fontWeight:700,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>{poll.phase==="trivia"?"⚡ TRIVIA":"💬 Poll"}</div>
          <div className="syne" style={{fontSize:17,lineHeight:1.4}}>{poll.question}</div>
        </Card>
        {poll.options.map(opt=>{
          let cls="opt";
          if(myAns){cls+=" done";if(poll.correct){if(opt.id===poll.correct)cls+=" correct";else if(opt.id===myAns)cls+=" wrong";}else if(opt.id===myAns)cls+=" sel";}
          return <button key={opt.id} className={cls} onClick={()=>answerPoll(poll.id,opt.id)}>{opt.label}</button>;
        })}
        {showEdu&&showEdu.pollId===poll.id&&(
          <div className="fade" style={{marginTop:14,padding:16,background:"rgba(6,214,160,.08)",borderRadius:12,border:"1px solid rgba(6,214,160,.3)"}}>
            <div style={{fontSize:11,color:"#06D6A0",fontWeight:700,marginBottom:6}}>💡 Did you know?</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,.85)",lineHeight:1.6,marginBottom:12}}>{showEdu.text}</div>
            <Btn onClick={dismissEdu} style={{background:"#06D6A0",color:NAV,fontSize:12,padding:"8px 16px"}}>Next →</Btn>
          </div>
        )}
      </>
    );
  }

  if(screen==="toolkit"){
    if(tkStep>=TKQ.length){finishToolkit();return null;}
    const q=TKQ[tkStep];
    return wrap(
      <>
        <div style={{marginBottom:20}}>
          <div className="syne" style={{fontSize:16,color:"#7B2FBE",marginBottom:4}}>🔬 Build Your ND Toolkit</div>
          <div style={{fontSize:12,color:"#7B8FB0"}}>Step {tkStep+1} of {TKQ.length}</div>
          <div className="bar" style={{marginTop:8}}><div className="fill" style={{width:`${(tkStep/TKQ.length)*100}%`,background:"linear-gradient(90deg,#7B2FBE,#00B4D8)"}}/></div>
        </div>
        <Card className="fade" style={{padding:20,marginBottom:14}} key={tkStep}>
          <div className="syne" style={{fontSize:16,lineHeight:1.4}}>{q.question}</div>
        </Card>
        {q.options.map(opt=>(
          <button key={opt.id} className={`opt${tkAns[q.id]===opt.id?" sel":""}`} onClick={()=>{
            const next={...tkAns,[q.id]:opt.id};setTkAns(next);
            setTimeout(()=>{if(tkStep<TKQ.length-1)setTkStep(s=>s+1);else finishToolkit(next);},300);
          }}>{opt.label}</button>
        ))}
      </>
    );
  }

  if(screen==="result"&&result){
    const tool=result;const max=TKQ.length*2;
    return wrap(
      <>
        <div style={{textAlign:"center",marginBottom:20}} className="fade">
          <div className="syne" style={{fontSize:20,color:"#F4A261"}}>Your ND Toolkit Match! 🎉</div>
          <div style={{fontSize:13,color:"#7B8FB0",marginTop:4}}>{name}'s personalised result</div>
        </div>
        <Card className="fade" style={{padding:24,textAlign:"center",borderColor:tool.color,background:"rgba(0,0,0,.1)",marginBottom:14}}>
          <div style={{fontSize:48,marginBottom:8}}>{tool.emoji}</div>
          <div style={{fontSize:11,letterSpacing:2,color:tool.color,fontWeight:700,marginBottom:4}}>YOUR PRIMARY TOOL</div>
          <div className="syne" style={{fontSize:22,marginBottom:4}}>{tool.name}</div>
          <div style={{fontSize:12,color:tool.color,marginBottom:14}}>{tool.badge}</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,.8)",lineHeight:1.7,borderTop:"1px solid rgba(255,255,255,.1)",paddingTop:14}}>
            <strong>Your first step: </strong>{tool.tip}
          </div>
        </Card>
        <Card style={{padding:18,marginBottom:14}} className="fade">
          <div style={{fontSize:11,color:"#7B8FB0",marginBottom:10,fontWeight:600,letterSpacing:.5}}>YOUR TOOL AFFINITY</div>
          {Object.entries(tool.scores).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
            const t=TOOLS[k],pct=Math.round(v/max*100);
            return(<div key={k} style={{marginBottom:9}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span>{t.emoji} {t.name}</span><span style={{color:t.color}}>{pct}%</span></div>
              <div className="bar"><div className="fill" style={{width:`${pct}%`,background:t.color}}/></div>
            </div>);
          })}
        </Card>
        <div style={{marginTop:14}}>
          <PulsePollScreen
            questions={PULSE_POST}
            title="One last thing — quick check-out"
            subtitle="4 questions · 60 seconds"
            color="#06D6A0"
            name={name}
            prefix="post"
            onDone={()=>setScreen("done")}
          />
        </div>
      </>
    );
  }

  if(screen==="done")return wrap(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",margin:-20}}>
      <div style={{textAlign:"center"}} className="fade">
        <div style={{fontSize:48,marginBottom:14}}>✅</div>
        <div className="syne" style={{fontSize:20,marginBottom:6,color:"#06D6A0"}}>All done, {name}!</div>
        <div style={{color:"#7B8FB0",fontSize:13,marginBottom:18}}>Thanks for your time. Your results are saved.</div>
        <Card style={{padding:16,maxWidth:320,margin:"0 auto"}}>
          <div style={{fontSize:13,color:"#7B8FB0",lineHeight:1.7,textAlign:"center"}}>Want to go deeper?<br/>Ask Caryn about the AI Operating System workshop.</div>
        </Card>
      </div>
    </div>
  );

  return wrap(<div style={{color:"#7B8FB0",padding:80,textAlign:"center"}}>Loading...</div>);
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const[mode,setMode]=useState(null);
  if(!mode)return(
    <div style={{minHeight:"100vh",background:NAV,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{textAlign:"center",maxWidth:400}} className="fade">
        <div style={{fontSize:52,marginBottom:14}}>🧠</div>
        <div className="syne" style={{fontSize:26,lineHeight:1.2,marginBottom:6,color:"#fff"}}>From Overwhelm<br/><span style={{color:"#00B4D8"}}>to Outcomes</span></div>
        <div style={{color:"#7B8FB0",fontSize:13,marginBottom:36}}>Neurodiversity Celebration Week</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,maxWidth:320,margin:"0 auto"}}>
          <Btn onClick={()=>setMode("host")} style={{padding:"14px 24px",fontSize:15,background:"rgba(244,162,97,.15)",color:"#F4A261",border:"2px solid rgba(244,162,97,.4)"}}>🎮 Host — Live Session</Btn>
          <Btn onClick={()=>setMode("player")} style={{padding:"14px 24px",fontSize:15,background:"#00B4D8",color:NAV}}>🙋 Player — Join Live Session</Btn>
          <Btn onClick={()=>setMode("solo")} style={{padding:"14px 24px",fontSize:15,background:"rgba(123,47,190,.2)",color:"#9B59B6",border:"2px solid rgba(123,47,190,.4)"}}>🎧 Solo — Go at my own pace</Btn>
        </div>
        <div style={{marginTop:20,fontSize:11,color:"#7B8FB0",lineHeight:1.8}}>
          Host controls the live session<br/>
          Players join on their own device<br/>
          Solo mode works anytime, no host needed
        </div>
      </div>
    </div>
  );
  if(mode==="host")return <HostView/>;
  if(mode==="player")return <PlayerView/>;
  return <SoloView/>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
